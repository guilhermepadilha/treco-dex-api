spring:
  application:
    name: treco-dex-api
  flyway:
    locations: classpath:db/migrations
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:treco_dex_api}
    username: ${DB_USER:treco_dex_api}
    password: ${DB_PASSWORD:treco_dex_api}
    driver-class-name: org.postgresql.Driver
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
    consumer:
      group-id: treco-dex-api-consumers
      auto-offset-reset: earliest

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.treco.dex.api: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/treco-dex-api.log
    max-size: 10MB
    max-history: 10

app:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production}
    expiration: 86400000
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  ai:
    base-url: ${AI_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${AI_API_KEY:demo}
    model-name: ${AI_MODEL_NAME:idia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
    fallback-model: ${AI_MODEL_FALLBACK:nvidia/nemotron-nano-12b-v2-vl:free}
    http-referer: ${AI_HTTP_REFERER:https://trecodex.com}
    x-title: ${AI_X_TITLE:TrecoDex API}


